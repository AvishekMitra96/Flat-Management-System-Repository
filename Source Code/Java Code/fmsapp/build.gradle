plugins {
	id 'java'
	id 'org.springframework.boot' version '4.0.6'
	id 'io.spring.dependency-management' version '1.1.7'
	id "org.owasp.dependencycheck" version "12.0.0"
}

group = 'com.fms'
version = '0.0.1-SNAPSHOT'
description = 'Demo project for Spring Boot'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}
}

repositories {
	mavenCentral()
}

dependencyCheck {
	nvd {
		apiKey = System.getProperty("nvdApiKey") ?: project.findProperty("nvdApiKey")
	}
    analyzers {
        ossIndex {
            enabled = true
            username = project.findProperty("ossIndexUsername")
            password = project.findProperty("ossIndexPassword")
        }
    }
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-webmvc'
    implementation 'com.oracle.database.jdbc:ojdbc8:21.1.0.0'

	testImplementation 'org.springframework.boot:spring-boot-starter-data-jpa-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
	useJUnitPlatform()

}
